<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RSI Forge</title>
<style>
    body { font-family: system-ui, sans-serif; background: #05050f; color: #ddd; margin:0; padding:20px; }
    .forge { max-width: 900px; margin: auto; background: #111118; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 60px rgba(255,77,77,0.2); }
    .header { background: #1a1a2e; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; }
    .title { font-size: 28px; font-weight: 700; color: #ff4d4d; }
    .chat { height: 520px; overflow-y: auto; padding: 25px; background: #0a0a14; }
    .message { margin: 18px 0; padding: 18px 22px; border-radius: 14px; }
    .human { background: #3a3a7a; margin-left: auto; }
    .agent { background: #1f1f35; border-left: 5px solid #ff4d4d; }
    .input-area { padding: 25px; background: #1a1a2e; }
    textarea { width: 100%; height: 130px; background: #1a1a2e; color: white; border: 1px solid #444; border-radius: 12px; padding: 16px; }
    button { background: #ff4d4d; color: white; padding: 14px 32px; border: none; border-radius: 10px; cursor: pointer; margin: 8px 8px 8px 0; }
</style>
</head>
<body>
<div class="forge">
    <div class="header">
        <div class="title">🔥 RSI Forge</div>
        <div style="color:#4caf50;">● Live</div>
    </div>
    <div class="chat" id="chat"></div>
    <div class="input-area">
        <textarea id="input" placeholder="Paste your Human Anchor prompt..."></textarea><br>
        <button onclick="send()">Submit Anchor</button>
        <button onclick="exportSession()">Export Session</button>
    </div>
</div>

<script>
let history = [];

function addMessage(text, type) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = `message ${type}`;
    div.innerHTML = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function send() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;
    addMessage(`<strong>You:</strong> ${text}`, 'human');
    input.value = "";

    setTimeout(() => {
        const replies = [
            "Anchor received. Human flourishing locked as fixed point.",
            "Meta-recursive rule integrated. System can now evolve its own criteria.",
            "30-day high-leverage features identified: persistent memory, phase detection, multi-user anchoring.",
            "Synthesis complete. Persistent memory with real recursive capability is priority #1."
        ];
        addMessage(`<strong>RSI Forge:</strong> ${replies[Math.floor(Math.random()*replies.length)]}`, 'agent');
    }, 800);
}

function exportSession() {
    let text = "RSI Forge Session\n\n";
    history.forEach(h => text += h + "\n\n");
    const blob = new Blob([text], {type: "text/plain"});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = "RSI_Forge_Session.txt";
    a.click();
}

// Welcome
addMessage("<strong>RSI Forge:</strong> Welcome. Paste your first Human Anchor prompt.", 'agent');
</script>
</body>
</html>
