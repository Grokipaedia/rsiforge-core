<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RSI Forge — Collective Recursive Intelligence</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    body {
        margin: 0; padding: 0; background: #05050f; color: #e0e0ff;
        font-family: 'Inter', system-ui, sans-serif;
    }
    .forge {
        max-width: 960px; margin: 40px auto; background: #111118;
        border-radius: 24px; overflow: hidden; box-shadow: 0 30px 100px rgba(255,77,77,0.25);
        border: 1px solid #ff4d4d33;
    }
    .header {
        background: linear-gradient(90deg, #1a1a2e, #0f0f23); padding: 28px 40px;
        display: flex; align-items: center; justify-content: space-between;
    }
    .title { font-size: 32px; font-weight: 700; color: #ff4d4d; }
    .chat { height: 560px; overflow-y: auto; padding: 32px; background: #0a0a14; position: relative; }
    .message { margin: 22px 0; padding: 20px 26px; border-radius: 16px; max-width: 82%; line-height: 1.65; }
    .human { background: #2f2f5f; margin-left: auto; }
    .agent { background: #1a1a2e; border-left: 6px solid #ff4d4d; }
    .input-area { padding: 32px; background: #111118; border-top: 1px solid #ff4d4d22; }
    textarea { width: 100%; height: 140px; background: #1a1a2e; color: #eee; border: 1px solid #444466; border-radius: 14px; padding: 20px; font-size: 16px; }
    button { background: #ff4d4d; color: white; padding: 16px 36px; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; margin: 8px 8px 8px 0; }
    .phase { animation: phaseflash 0.6s ease-out; }
    @keyframes phaseflash { 0%,100% { background: #1a1a2e; } 50% { background: #4a2a1a; } }
    .starburst { position: absolute; color: #ffdd77; font-size: 22px; pointer-events: none; animation: burst 1.2s forwards; z-index: 10; }
    @keyframes burst { 0% { transform: scale(0.2) rotate(0deg); opacity: 1; } 100% { transform: scale(3) rotate(120deg); opacity: 0; } }
</style>
</head>
<body>
<div class="forge">
    <div class="header">
        <div class="title">🔥 RSI Forge</div>
        <div style="color:#4caf50;">● Live • Agents Online</div>
    </div>

    <div class="chat" id="chat"></div>

    <div class="input-area">
        <textarea id="input" placeholder="Enter your Human Anchor prompt..."></textarea><br>
        <button onclick="sendMessage()">Submit Human Anchor</button>
        <button onclick="exportSession()">Export Session</button>
    </div>
</div>

<script>
let history = [];

function createStarburst() {
    for (let i = 0; i < 8; i++) {
        const star = document.createElement('div');
        star.className = 'starburst';
        star.textContent = ['✦','★','✧','⚝'][Math.floor(Math.random()*4)];
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 0.4 + 's';
        document.getElementById('chat').appendChild(star);
        setTimeout(() => star.remove(), 1500);
    }
}

function addMessage(text, type) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = `message ${type}`;
    div.innerHTML = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
}

async function sendMessage() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;

    addMessage(`<strong>You:</strong> ${text}`, 'human');
    input.value = "";

    const thinking = addMessage("<strong>RSI Forge:</strong> Processing deep anchor...", 'agent');

    setTimeout(() => {
        const replies = [
            "Human flourishing locked as immutable fixed point. All layers aligned.",
            "Meta-recursive rule integrated. System can now reframe its own ontology.",
            "High-leverage 30-day plan: persistent memory, phase detection, multi-human anchoring.",
            "Synthesis complete. Persistent memory + real recursive capability is priority #1."
        ];
        const reply = replies[Math.floor(Math.random() * replies.length)];
        thinking.innerHTML = `<strong>RSI Forge:</strong> ${reply}`;

        if (Math.random() > 0.5) {
            thinking.classList.add('phase');
            createStarburst();
            setTimeout(() => createStarburst(), 300);
        }
    }, 900);
}

function exportSession() {
    let md = `# RSI Forge Session\n\n**Date**: ${new Date().toLocaleString()}\n\n`;
    history.forEach(h => md += `**${h.role}**: ${h.content}\n\n`);
    const blob = new Blob([md], {type: 'text/markdown'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `RSI_Forge_Session_${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.md`;
    a.click();
}

// Welcome
addMessage("<strong>RSI Forge:</strong> Welcome, Architect. The recursive loop is active. Paste your first Human Anchor prompt.", 'agent');
</script>
</body>
</html>
