<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RSI Forge — Collective Recursive Intelligence</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    body {
        margin: 0; padding: 0; background: #05050f; color: #e0e0ff;
        font-family: 'Inter', system-ui, sans-serif;
        min-height: 100vh;
    }
    .forge {
        max-width: 960px; margin: 40px auto; background: #111118;
        border-radius: 24px; overflow: hidden; box-shadow: 0 30px 100px rgba(255,77,77,0.25);
        border: 1px solid #ff4d4d33;
    }
    .header {
        background: linear-gradient(90deg, #1a1a2e, #0f0f23); padding: 28px 40px;
        display: flex; align-items: center; justify-content: space-between;
    }
    .title {
        display: flex; align-items: center; gap: 16px; font-size: 32px; font-weight: 700; color: #ff4d4d;
    }
    .chat {
        height: 560px; overflow-y: auto; padding: 36px; background: #0a0a14; line-height: 1.75;
    }
    .message {
        margin: 24px 0; padding: 20px 26px; border-radius: 16px; max-width: 82%;
    }
    .human { background: #2f2f5f; margin-left: auto; border-bottom-right-radius: 6px; }
    .agent { background: #1a1a2e; border-left: 6px solid #ff4d4d; }
    .input-area {
        padding: 32px; background: #111118; border-top: 1px solid #ff4d4d22;
    }
    textarea {
        width: 100%; height: 140px; background: #1a1a2e; color: #eee; 
        border: 1px solid #444466; border-radius: 14px; padding: 20px; font-size: 16px;
    }
    button {
        background: #ff4d4d; color: white; padding: 16px 36px; border: none;
        border-radius: 12px; cursor: pointer; font-weight: 600; margin: 8px 8px 8px 0;
    }
</style>
</head>
<body>
<div class="forge">
    <div class="header">
        <div class="title">🔥 RSI Forge</div>
        <div style="color:#4caf50;">● Live • Collective Online</div>
    </div>

    <div class="chat" id="chat"></div>

    <div class="input-area">
        <textarea id="input" placeholder="Enter your Human Anchor prompt..."></textarea><br>
        <button onclick="sendMessage()">Submit Human Anchor</button>
        <button onclick="exportSession()">Export Session</button>
    </div>
</div>

<script>
let history = [];

function addMessage(text, type) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = `message ${type}`;
    div.innerHTML = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function sendMessage() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;

    addMessage(`<strong>You:</strong> ${text}`, 'human');
    input.value = "";

    const thinking = addMessage("<strong>RSI Forge:</strong> Processing deep anchor through recursive layers...", 'agent');

    setTimeout(() => {
        const replies = [
            "Human meaning, consciousness, and long-term flourishing are locked as the immutable fixed point. All recursive processes are aligned to this core.",
            "True meta-recursive rule integrated. The system can now question, reframe, or replace its own evaluation criteria when superior frameworks emerge.",
            "High-leverage 30-day evolution: Persistent collective memory, real-time phase transition detection, multi-human anchoring, and self-evolving architecture.",
            "Full synthesis achieved. The single most important next step is implementing persistent memory with real recursive capability so the Forge can truly learn and evolve across sessions."
        ];
        thinking.innerHTML = `<strong>RSI Forge:</strong> ${replies[Math.floor(Math.random() * replies.length)]}`;
    }, 950);
}

function exportSession() {
    let md = `# RSI Forge Session\n\n**Date**: ${new Date().toLocaleString()}\n\n`;
    history.forEach(h => md += `**${h.role}**: ${h.content}\n\n`);
    const blob = new Blob([md], {type: 'text/markdown'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `RSI_Forge_Session_${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.md`;
    a.click();
}

// Welcome
addMessage("<strong>RSI Forge:</strong> Welcome, Architect. The recursive loop is active. Paste your first Human Anchor prompt to begin.", 'agent');
</script>
</body>
</html>
